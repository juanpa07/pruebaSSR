<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba SSR SEO cc-text — Slot heading SIN role=none</title>
  <meta name="description" content="cc-text con h1-h6 en el slot y SIN el atributo role=none, para aislar su efecto en el evaluador SEO." />
  <link rel="stylesheet" href="./dist/ebf-tailwind.min.css" />
  <script type="module" src="./dist/cc-text-norole.bundle.js"></script>
</head>
<body>

<cc-text-norole color="lime-vivid-main" fontsize="h1" fontfamily="main" align="start" weight="normal"><h1>This is a Heading H1</h1></cc-text-norole>
<br/>
<cc-text-norole color="graphite-deep-main" fontsize="h2" fontfamily="main" align="start" weight="normal"><h2>This is a Heading H2</h2></cc-text-norole>
<br/>
<cc-text-norole color="graphite-deep-main" fontsize="h3" fontfamily="main" align="start" weight="normal"><h3>This is a Heading H3</h3></cc-text-norole>
<br/>
<cc-text-norole color="graphite-deep-main" fontsize="h4" fontfamily="main" align="start" weight="normal"><h4>This is a Heading H4</h4></cc-text-norole>
<br/>
<cc-text-norole color="graphite-deep-main" fontsize="h5" fontfamily="main" align="start" weight="normal"><h5>This is a Heading H5</h5></cc-text-norole>
<br/>
<cc-text-norole color="graphite-deep-main" fontsize="h6" fontfamily="main" align="start" weight="normal"><h6>This is a Heading H6</h6></cc-text-norole>
<br/>
<cc-text-norole color="graphite-deep-main" fontsize="lg" fontfamily="main" align="start" weight="normal"><p>This is a paragraph of body text so the evaluator has enough content to analyze the page structure.</p></cc-text-norole>

</body>
</html>
